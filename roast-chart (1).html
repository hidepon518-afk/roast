<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>焙煎カーブ — 手鍋焙煎ログ</title>
<style>
  :root{
    --paper:#FBF8F2;
    --card:#FFFFFF;
    --ink:#241A12;
    --muted:#8A7B6A;
    --line:#E6DECF;
    --amber:#B85C25;
    --slate:#4E6E81;
    --header:#2C1E13;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  header{
    background:var(--header);
    color:#F4EBDD;
    padding:max(14px, env(safe-area-inset-top)) 18px 16px;
  }
  header .eyebrow{font-size:11px;letter-spacing:.18em;color:#C9A87E;margin-bottom:4px;}
  header h1{font-size:19px;font-weight:600;}
  main{padding:18px 16px;max-width:560px;margin:0 auto;}
  .field{margin-bottom:16px;}
  label{
    display:block;font-size:12px;font-weight:600;color:var(--muted);
    letter-spacing:.06em;margin-bottom:6px;
  }
  input[type=text], textarea{
    width:100%;border:1px solid var(--line);border-radius:10px;
    background:var(--card);color:var(--ink);
    font-size:16px;padding:12px;
    -webkit-appearance:none;
  }
  textarea{
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    min-height:170px;line-height:1.7;font-size:15px;
  }
  input::placeholder, textarea::placeholder{color:#C2B6A4;}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6;}
  button{
    width:100%;border:none;border-radius:12px;
    font-size:17px;font-weight:600;padding:15px;
    font-family:inherit;
  }
  button:active{opacity:.85;}
  button.primary{background:var(--amber);color:#FFF;margin-bottom:10px;}
  button.secondary{background:#EFE8DB;color:var(--ink);}
  button.share{background:var(--header);color:#F4EBDD;margin-top:14px;}
  #err{
    display:none;margin-top:14px;padding:12px;border-radius:10px;
    background:#F6E3DC;color:#8A3B22;font-size:14px;line-height:1.6;
  }
  #result{margin-top:22px;display:none;}
  #result img{
    width:100%;border-radius:12px;border:1px solid var(--line);
    box-shadow:0 2px 10px rgba(44,30,19,.08);display:block;
  }
  .save-hint{
    margin-top:8px;text-align:center;font-size:13px;color:var(--muted);line-height:1.6;
  }
</style>
</head>
<body>
<header>
  <div class="eyebrow">PAN ROAST LOG</div>
  <h1>焙煎カーブ</h1>
</header>
<main>
  <button class="primary" id="fromClip">クリップボードから作成</button>
  <div class="hint" style="margin-bottom:18px">Claudeの出力（焙煎ログ全文でもOK）をコピーした状態で押すと、貼り付け→グラフ生成まで一気にやります。</div>

  <div class="field">
    <label>タイトル</label>
    <input type="text" id="title" placeholder="例：フローレス エコヘト 1回目" autocomplete="off">
  </div>
  <div class="field">
    <label>データ（手入力する場合）</label>
    <textarea id="data" placeholder="0 78&#10;2 92&#10;4 150&#10;6 176&#10;8:30 195&#10;1ハゼ 8:10&#10;煎り止め 10:30"></textarea>
    <div class="hint">「1ハゼ」「煎り止め（2ハゼ）」を含む行は自動でフラグになります。時間は「8:10」「8分10秒」「8.5」どれでも可。</div>
  </div>
  <button class="secondary" id="go">グラフ画像を作る</button>
  <div id="err"></div>
  <div id="result">
    <img id="png" alt="焙煎カーブ">
    <button class="share" id="share">共有して保存（写真に追加）</button>
    <div class="save-hint">共有が使えない場合は画像を長押し →「写真に追加」</div>
  </div>
</main>

<script>
let lastCanvas = null;
let lastFname = 'roast';

function parseTime(tok){
  if(tok==null) return null;
  tok = String(tok).trim();
  if(tok==='') return null;
  if(tok.includes(':')){
    const p = tok.split(':');
    const m = parseFloat(p[0]), s = parseFloat(p[1]);
    if(isNaN(m)||isNaN(s)) return null;
    return m + s/60;
  }
  const v = parseFloat(tok);
  return isNaN(v) ? null : v;
}

function normalize(line){
  return line
    .replace(/：/g,':').replace(/，/g,',').replace(/．/g,'.')
    .replace(/(\d)\s*分\s*(\d+)\s*秒?/g,'$1:$2')
    .replace(/分/g,'').replace(/秒/g,'')
    .replace(/℃|°C|度/g,'');
}

const RE_CRACK = /[1１]\s*ハゼ/;
const RE_END   = /煎り?止め?|ドロップ|[2２]\s*ハゼ/;
const RE_RANGE = /[〜~]/;

function parseAll(text){
  const pts = [];
  let crackT = null, endT = null;
  const lines = text.split(/\n/);

  for(let raw of lines){
    if(raw.trim()==='---' || raw.trim().startsWith('#')) continue;

    const isCrack = RE_CRACK.test(raw);
    const isEnd = RE_END.test(raw);

    if((isCrack || isEnd) && !RE_RANGE.test(raw)){
      let s = normalize(raw.replace(/[1１2２]\s*ハゼ/g,' ').replace(/煎り?止め?|ドロップ/g,' '));
      const m = s.match(/(\d+(?::\d+)?(?:\.\d+)?)/);
      if(m){
        const t = parseTime(m[1]);
        if(t!=null && t>0 && t<=40){
          if(isCrack && !isEnd && crackT==null) crackT = t;
          if(isEnd && endT==null) endT = t;
        }
        // 温度も書いてあればデータ点として拾う
        const rest = s.slice(s.indexOf(m[1])+m[1].length);
        const m2 = rest.match(/(\d+(?:\.\d+)?)/);
        if(m2){
          const temp = parseFloat(m2[1]);
          if(temp>=60 && temp<=300 && t!=null && t<=40) pts.push({t:t, temp:temp});
        }
      }
      continue;
    }

    const line = normalize(raw);
    const m = line.match(/(\d+(?::\d+)?(?:\.\d+)?)[^\d:.\-]+(\d+(?:\.\d+)?)/);
    if(!m) continue;
    const t = parseTime(m[1]);
    const temp = parseFloat(m[2]);
    if(t==null || isNaN(temp)) continue;
    if(t<0 || t>40 || temp<20 || temp>300) continue;
    pts.push({t:t, temp:temp});
  }

  // 重複時間はあとの値で上書きせず最初を採用
  const seen = {}, uniq = [];
  for(const p of pts){
    const k = p.t.toFixed(3);
    if(!seen[k]){ seen[k]=1; uniq.push(p); }
  }
  uniq.sort((a,b)=>a.t-b.t);
  return {pts:uniq, crackT:crackT, endT:endT};
}

function guessTitle(text){
  for(let raw of text.split(/\n/)){
    const s = raw.replace(/^[#\-\s>*]+/,'').trim();
    if(s==='' || s==='---') continue;
    // データ行・マイルストーン行っぽければタイトルにしない
    const n = normalize(s);
    if(/^\d/.test(n) && /(\d+(?::\d+)?(?:\.\d+)?)[^\d:.\-]+(\d+)/.test(n) === false && !/_/.test(s)) {}
    if(RE_CRACK.test(s) || RE_END.test(s)) continue;
    if(/^\d+(?::\d+)?\s/.test(n)) continue;
    return s.replace(/\.md$/,'');
  }
  return '焙煎カーブ';
}

function fmtTime(t){
  const m = Math.floor(t);
  const s = Math.round((t-m)*60);
  if(s===0) return m + '分';
  return m + ':' + String(s).padStart(2,'0');
}

function interpTemp(pts, t){
  if(t<=pts[0].t) return pts[0].temp;
  for(let i=1;i<pts.length;i++){
    if(t<=pts[i].t){
      const a=pts[i-1], b=pts[i];
      return a.temp + (b.temp-a.temp)*(t-a.t)/(b.t-a.t);
    }
  }
  return pts[pts.length-1].temp;
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
}

function draw(){
  const errBox = document.getElementById('err');
  errBox.style.display='none';
  const parsed = parseAll(document.getElementById('data').value);
  const pts = parsed.pts;
  if(pts.length<2){
    errBox.textContent='温度データが2点以上必要です。「0 78」のように1行ずつ入力してください。';
    errBox.style.display='block';
    document.getElementById('result').style.display='none';
    return;
  }
  const title = document.getElementById('title').value.trim() || '焙煎カーブ';
  lastFname = title.replace(/[\/\\:*?"<>|\s]+/g,'_');
  const crackT = parsed.crackT;
  let dropT = parsed.endT;
  const tEnd = pts[pts.length-1].t;

  // RoR: 区間の中点時刻にプロット（Artisan流）
  const rorRaw = [];
  for(let i=1;i<pts.length;i++){
    const dt = pts[i].t - pts[i-1].t;
    if(dt>0) rorRaw.push({t:(pts[i].t+pts[i-1].t)/2, v:(pts[i].temp-pts[i-1].temp)/dt});
  }
  // 3点加重移動平均（0.25/0.5/0.25）で平滑化。点が少なければ生のまま
  const ror = rorRaw.length >= 4
    ? rorRaw.map((r,i)=>{
        const p = rorRaw[i-1]||r, n = rorRaw[i+1]||r;
        return {t:r.t, v: p.v*0.25 + r.v*0.5 + n.v*0.25};
      })
    : rorRaw;

  const S = 2;
  const W = 800, H = 640;
  const cv = document.createElement('canvas');
  cv.width = W*S; cv.height = H*S;
  const ctx = cv.getContext('2d');
  ctx.scale(S,S);

  const C = {
    paper:'#FDFBF7', ink:'#241A12', muted:'#9A8B78', grid:'#ECE4D5',
    amber:'#B85C25', amberSoft:'rgba(184,92,37,0.07)', slate:'#4E6E81',
    line:'#DDD2BE'
  };
  const sans = '"Helvetica Neue","Hiragino Sans",sans-serif';
  const mono = '"SF Mono",Menlo,monospace';

  ctx.fillStyle = C.paper;
  ctx.fillRect(0,0,W,H);

  const padL=64, padR=64, padT=96, padB=104;
  const plotW = W-padL-padR, plotH = H-padT-padB;

  // --- 温度軸（左）: 25℃刻み ---
  // X軸は0〜20分固定（万一データが超えたら拡張）
  const tMax = Math.max(20, Math.ceil(tEnd), dropT?Math.ceil(dropT):0);
  const temps = pts.map(p=>p.temp);
  const yMin = Math.floor((Math.min(...temps)-5)/25)*25;
  const yMax = Math.ceil((Math.max(...temps)+5)/25)*25;
  const N = (yMax-yMin)/25; // グリッド行数

  // --- RoR軸（右）: 温度軸とは独立した刻み。
  // RoRカーブがプロット高さの約70%以内に収まる最小ステップを選ぶ
  const rorVals = ror.map(r=>r.v);
  const rorMax = Math.max(...rorVals, 1);
  const rorMin = Math.min(...rorVals, 0);
  let rStep = 2;
  for(const s of [2,3,5,10,15,20,25,30]){
    const rmin = Math.floor(Math.min(0,rorMin)/s)*s;
    if(rorMax - rmin <= 0.7*s*N){ rStep = s; break; }
    rStep = s;
  }
  const rMin = Math.floor(Math.min(0,rorMin)/rStep)*rStep;
  const rMax = rMin + rStep*N;

  const X = t => padL + (t/tMax)*plotW;
  const Y = v => padT + (1-(v-yMin)/(yMax-yMin))*plotH;
  const YR = v => padT + (1-(v-rMin)/(rMax-rMin))*plotH;

  // header
  ctx.fillStyle = C.muted;
  ctx.font = '600 11px '+sans;
  ctx.textAlign='left';
  const today = new Date();
  const dateStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
  ctx.fillText('PAN ROAST LOG ・ '+dateStr, padL, 34);
  ctx.fillStyle = C.ink;
  ctx.font = '700 22px '+sans;
  ctx.fillText(title, padL, 64);

  ctx.font='600 12px '+sans;
  ctx.textAlign='right';
  ctx.fillStyle=C.amber; ctx.fillText('● 温度', W-padR-64, 62);
  ctx.fillStyle=C.slate; ctx.fillText('● RoR', W-padR, 62);

  // 発達フェーズの帯
  if(crackT!=null){
    const endBand = dropT!=null ? dropT : tEnd;
    if(endBand>crackT){
      ctx.fillStyle = C.amberSoft;
      ctx.fillRect(X(crackT), padT, X(Math.min(endBand,tMax))-X(crackT), plotH);
    }
  }

  // grid + 軸ラベル
  ctx.lineWidth=1;
  for(let i=0;i<=N;i++){
    const tv = yMin + 25*i;
    const rv = rMin + rStep*i;
    const y = Y(tv);
    ctx.strokeStyle=C.grid;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W-padR, y); ctx.stroke();
    ctx.font='500 11px '+mono;
    ctx.fillStyle=C.muted; ctx.textAlign='right';
    ctx.fillText(tv+'', padL-10, y+4);
    ctx.fillStyle='#9FB2BD'; ctx.textAlign='left';
    ctx.fillText(rv+'', W-padR+10, y+4);
  }
  // RoR=0 の基準線（マイナス域がある時だけ強調）
  if(rMin<0){
    ctx.strokeStyle='#C3CFD6';
    ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(padL, YR(0)); ctx.lineTo(W-padR, YR(0)); ctx.stroke();
    ctx.setLineDash([]);
  }
  // x labels
  ctx.textAlign='center'; ctx.fillStyle=C.muted; ctx.font='500 11px '+mono;
  const xStep = tMax>16 ? 2 : 1;
  // 1分ごとの小目盛り
  for(let t=0;t<=tMax;t++){
    ctx.strokeStyle=C.grid;
    ctx.beginPath(); ctx.moveTo(X(t), padT+plotH); ctx.lineTo(X(t), padT+plotH+3); ctx.stroke();
  }
  for(let t=0;t<=tMax;t+=xStep){
    ctx.fillText(t+'分', X(t), padT+plotH+22);
    ctx.strokeStyle=C.grid;
    ctx.beginPath(); ctx.moveTo(X(t), padT+plotH); ctx.lineTo(X(t), padT+plotH+5); ctx.stroke();
  }
  ctx.font='600 10px '+sans;
  ctx.fillStyle=C.muted; ctx.textAlign='left';
  ctx.fillText('℃', padL-30, padT-14);
  ctx.fillStyle='#9FB2BD'; ctx.textAlign='right';
  ctx.fillText('℃/分', W-padR+34, padT-14);

  ctx.strokeStyle=C.line;
  ctx.strokeRect(padL, padT, plotW, plotH);

  // RoR（破線・先に描く）
  if(ror.length){
    ctx.strokeStyle=C.slate; ctx.lineWidth=2;
    ctx.setLineDash([6,5]);
    ctx.beginPath();
    ror.forEach((r,i)=>{ i===0?ctx.moveTo(X(r.t),YR(r.v)):ctx.lineTo(X(r.t),YR(r.v)); });
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle=C.slate;
    ror.forEach(r=>{ ctx.beginPath(); ctx.arc(X(r.t),YR(r.v),3,0,7); ctx.fill(); });
  }

  // 温度カーブ
  ctx.strokeStyle=C.amber; ctx.lineWidth=3;
  ctx.lineJoin='round';
  ctx.beginPath();
  pts.forEach((p,i)=>{ i===0?ctx.moveTo(X(p.t),Y(p.temp)):ctx.lineTo(X(p.t),Y(p.temp)); });
  ctx.stroke();
  pts.forEach(p=>{
    ctx.beginPath(); ctx.arc(X(p.t),Y(p.temp),4.5,0,7);
    ctx.fillStyle='#FDFBF7'; ctx.fill();
    ctx.strokeStyle=C.amber; ctx.lineWidth=2.5; ctx.stroke();
  });

  // マイルストーンフラグ（重なり防止で段違い配置）
  let flagRow = 0;
  function flag(t, label){
    const x = X(t);
    ctx.strokeStyle='#A0522D'; ctx.lineWidth=1.5;
    ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(x,padT); ctx.lineTo(x,padT+plotH); ctx.stroke();
    ctx.setLineDash([]);
    const temp = Math.round(interpTemp(pts, t));
    ctx.font='700 12px '+sans;
    const text1 = label+' '+fmtTime(t);
    const w = Math.max(ctx.measureText(text1).width, 36)+16;
    let bx = x-w/2;
    bx = Math.max(padL+4, Math.min(bx, W-padR-w-4));
    const by = padT+18 + flagRow*46;
    flagRow++;
    ctx.fillStyle='#FFF';
    ctx.strokeStyle='#D8C9B2';
    roundRect(ctx, bx, by-12, w, 38, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle=C.ink; ctx.textAlign='center';
    ctx.fillText(text1, bx+w/2, by+3);
    ctx.fillStyle=C.amber; ctx.font='600 11px '+mono;
    ctx.fillText(temp+'℃', bx+w/2, by+18);
  }
  if(crackT!=null) flag(crackT,'1ハゼ');
  if(dropT!=null) flag(dropT,'煎り止め');

  // footer stats
  const fy = H-46;
  ctx.strokeStyle=C.line;
  ctx.beginPath(); ctx.moveTo(padL, fy-22); ctx.lineTo(W-padR, fy-22); ctx.stroke();
  function stat(x, label, value){
    ctx.textAlign='left';
    ctx.fillStyle=C.muted; ctx.font='600 11px '+sans;
    ctx.fillText(label, x, fy);
    ctx.fillStyle=C.ink; ctx.font='700 18px '+mono;
    ctx.fillText(value, x, fy+24);
  }
  stat(padL, '総時間', fmtTime(dropT!=null?dropT:tEnd));
  if(crackT!=null){
    const end = dropT!=null?dropT:tEnd;
    if(end>crackT){
      const dev = end-crackT;
      const dtr = dev/end*100;
      stat(padL+180, '発達時間', fmtTime(dev));
      stat(padL+360, 'DTR', dtr.toFixed(1)+'%');
    }
  }else{
    stat(padL+180, '最高温度', Math.max(...temps)+'℃');
  }

  lastCanvas = cv;
  const img = document.getElementById('png');
  img.src = cv.toDataURL('image/png');
  document.getElementById('result').style.display='block';
  setTimeout(()=>document.getElementById('result').scrollIntoView({behavior:'smooth'}),100);
}

function loadText(text){
  document.getElementById('data').value = text;
  const t = guessTitle(text);
  if(t) document.getElementById('title').value = t;
  draw();
}

document.getElementById('go').addEventListener('click', draw);

document.getElementById('fromClip').addEventListener('click', async ()=>{
  try{
    const text = await navigator.clipboard.readText();
    if(!text || !text.trim()) throw new Error('empty');
    loadText(text);
  }catch(e){
    const errBox = document.getElementById('err');
    errBox.textContent='クリップボードを読めませんでした。下の欄に手動で貼り付けて「グラフ画像を作る」を押してください。';
    errBox.style.display='block';
  }
});

document.getElementById('share').addEventListener('click', ()=>{
  if(!lastCanvas) return;
  lastCanvas.toBlob(async (blob)=>{
    const file = new File([blob], lastFname+'.png', {type:'image/png'});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file]}); }catch(e){}
    }else{
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = lastFname+'.png';
      a.click();
    }
  }, 'image/png');
});

// URLハッシュ経由の自動読み込み（#d=URLエンコード済みテキスト）
window.addEventListener('load', ()=>{
  const h = location.hash;
  if(h.startsWith('#d=')){
    try{ loadText(decodeURIComponent(h.slice(3))); }catch(e){}
  }
});
</script>
</body>
</html>
